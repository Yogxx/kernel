#==========================================================================
# Compile kernel 6.6.y with RTL8189FS WiFi driver for S905X STB
# Target: FiberHome HG680P & ZTE B860H
#==========================================================================

name: Compile Kernel (WiFi 8189fs for S905X)

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: "Select kernel version"
        required: false
        default: "6.6.y"
        type: choice
        options:
          - 6.6.y
          - 6.1.y
          - 5.15.y
      kernel_auto:
        description: "Auto use the latest kernel"
        required: false
        default: true
        type: boolean
      kernel_toolchain:
        description: "Select the compilation toolchain"
        required: false
        default: "gcc-14.2"
        type: choice
        options:
          - gcc
          - gcc-14.3
          - gcc-14.2
          - clang
      kernel_sign:
        description: "Set the kernel custom signature"
        required: false
        default: "-s905x-wifi"
        type: choice
        options:
          - -s905x-wifi
          - -yourname
      docker_image:
        description: "Select Armbian docker image"
        required: false
        default: "noble"
        type: choice
        options:
          - noble
          - bookworm
          - trixie
      ccache_clear:
        description: "Clear ccache before build"
        required: false
        default: false
        type: boolean
      delete_source:
        description: "Delete source after compilation"
        required: false
        default: true
        type: boolean

env:
  TZ: Asia/Jakarta

jobs:
  build:
    runs-on: ubuntu-24.04
    if: ${{ github.event.repository.owner.id == github.event.sender.id || !github.event.sender.id }}
    name: Compile kernel ${{ inputs.kernel_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize the build environment
        id: init
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker rmi -f $(docker images -q) 2>/dev/null || true
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android 2>/dev/null
          sudo swapoff -a
          sudo rm -f /swapfile /mnt/swapfile
          sudo -E apt-get -y update
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get clean
          sudo -E timedatectl set-timezone "${TZ}"
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Create virtual disk for extended storage
        id: disk
        run: |
          mnt_size=$(expr $(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 1)
          root_size=$(expr $(df -h / | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 4)
          sudo truncate -s "${mnt_size}"G /mnt/mnt.img
          sudo truncate -s "${root_size}"G /root.img
          sudo losetup /dev/loop6 /mnt/mnt.img
          sudo losetup /dev/loop7 /root.img
          sudo pvcreate /dev/loop6
          sudo pvcreate /dev/loop7
          sudo vgcreate github /dev/loop6 /dev/loop7
          sudo lvcreate -n runner -l 100%FREE github
          sudo mkfs.xfs -f -i sparse=0 -b size=4096 /dev/github/runner
          sudo mkdir -p /builder
          sudo mount /dev/github/runner /builder
          sudo chown -R runner:runner /builder
          df -Th
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Get kernel source commit hash
        id: kernelhash
        run: |
          api_url="https://api.github.com/repos/Yogxx/linux-${{ inputs.kernel_version }}/git/ref/heads/main"
          source_hash=$(curl -fsSL -m 20 \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              ${api_url} | jq -r '.object.sha')
          [[ -z "${source_hash}" || "${source_hash}" == "null" ]] && source_hash="${{ github.sha }}"
          echo "source_hash=${source_hash}" >> ${GITHUB_ENV}
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: /builder/ccache
          key: kernel-s905x-${{ inputs.kernel_toolchain }}-${{ inputs.kernel_version }}-${{ env.source_hash }}
          restore-keys: |
            kernel-s905x-${{ inputs.kernel_toolchain }}-${{ inputs.kernel_version }}-

      - name: Compile the kernel [ ${{ inputs.kernel_version }} ]
        uses: ophub/amlogic-s9xxx-armbian@main
        if: ${{ steps.disk.outputs.status == 'success' && !cancelled() }}
        with:
          build_target: kernel
          # Pakai Yogxx/linux-6.6.y yang sudah include driver rtl8189fs
          kernel_source: Yogxx
          kernel_version: ${{ inputs.kernel_version }}
          kernel_auto: ${{ inputs.kernel_auto }}
          delete_source: ${{ inputs.delete_source }}
          kernel_toolchain: ${{ inputs.kernel_toolchain }}
          kernel_sign: ${{ inputs.kernel_sign }}
          kernel_config: ""
          kernel_patch: kernel-patch/beta
          auto_patch: true
          ccache_clear: ${{ inputs.ccache_clear }}
          docker_hostpath: /builder
          docker_image: ophub/armbian-${{ inputs.docker_image }}:arm64

      - name: Upload Kernel to Release
        uses: ncipollo/release-action@main
        if: ${{ env.PACKAGED_STATUS == 'success' && !cancelled() }}
        with:
          tag: kernel_stable
          artifacts: ${{ env.PACKAGED_OUTPUTPATH }}/*
          allowUpdates: true
          removeArtifacts: false
          replacesArtifacts: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ## Kernel ${{ inputs.kernel_version }}${{ inputs.kernel_sign }}

            ### Info
            - ✅ RTL8189FS WiFi driver included (8189fs)
            - ✅ CONFIG_RTL8189FS=m
            - ✅ Toolchain: ${{ inputs.kernel_toolchain }}
            - ✅ Source: Yogxx/linux-${{ inputs.kernel_version }}

            ### Target STB
            - FiberHome HG680P (s905x / p212)
            - ZTE B860H V1 & V2 (s905x)

            ### Cara pakai
            Setelah install kernel ini di OpenWrt, WiFi internal aktif.
            Jika belum muncul, ganti DTB:
            - HG680P → `meson-gxl-s905x-p212.dtb`
            - B860H  → `meson-gxl-s905x-b860h.dtb`

      - name: Build Summary
        if: always()
        run: |
          echo "## Build Result" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Kernel | ${{ inputs.kernel_version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Sign | ${{ inputs.kernel_sign }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Toolchain | ${{ inputs.kernel_toolchain }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Source | Yogxx/linux-${{ inputs.kernel_version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ env.PACKAGED_STATUS }} |" >> $GITHUB_STEP_SUMMARY
          
