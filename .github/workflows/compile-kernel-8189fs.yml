name: Compile Kernel (WiFi 8189fs for S905X)

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: "Kernel version"
        required: false
        default: "6.6.y"
      kernel_auto:
        description: "Auto use latest version in series"
        required: false
        default: "true"
      kernel_sign:
        description: "Kernel signature/tag suffix"
        required: false
        default: "-s905x-wifi"

env:
  TZ: Asia/Jakarta

jobs:
  compile:
    runs-on: ubuntu-22.04
    if: github.event.repository.owner.id == github.event.sender.id || !github.event.sender.id
    name: Compile kernel ${{ inputs.kernel_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free up disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      # Driver 8189fs sudah ada di Yogxx/linux-6.6.y (hasil inject sebelumnya)
      # Patch 001 dan 002 sudah dicommit langsung di kernel-patch/beta/linux-6.6.y/
      # Tidak perlu generate patch lagi di sini

      - name: Compile the kernel
        uses: ophub/amlogic-s9xxx-armbian@main
        with:
          build_target: kernel
          kernel_version: ${{ inputs.kernel_version }}
          kernel_auto: ${{ inputs.kernel_auto }}
          kernel_sign: ${{ inputs.kernel_sign }}
          # Pakai fork Yogxx/linux-6.6.y yang sudah include driver rtl8189fs
          kernel_source: Yogxx
          kernel_config: kernel-config/release/stable
          kernel_patch: kernel-patch/beta
          auto_patch: true

      - name: Check compile output
        if: always()
        run: |
          echo "PACKAGED_STATUS=${{ env.PACKAGED_STATUS }}"
          echo "PACKAGED_OUTPUTPATH=${{ env.PACKAGED_OUTPUTPATH }}"
          if [ -d "${{ env.PACKAGED_OUTPUTPATH }}" ]; then
            ls -lh "${{ env.PACKAGED_OUTPUTPATH }}/"
          else
            echo "Searching for output files..."
            find /opt /builder /home/runner/work -name "*.tar.gz" 2>/dev/null | head -20 || true
          fi

      - name: Upload kernel to Releases
        uses: ncipollo/release-action@main
        with:
          tag: kernel_stable
          artifacts: ${{ env.PACKAGED_OUTPUTPATH }}/*
          allowUpdates: true
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ## Kernel ${{ inputs.kernel_version }}${{ inputs.kernel_sign }}

            - RTL8189FS WiFi driver included (HG680P & B860H)
            - CONFIG_RTL8189FS=m
            - Source: Yogxx/linux-6.6.y
            - Target: Amlogic S905X

      - name: Build Summary
        if: always()
        run: |
          echo "## Build Result" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Kernel | ${{ inputs.kernel_version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Sign | ${{ inputs.kernel_sign }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Source | Yogxx/linux-6.6.y |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ env.PACKAGED_STATUS }} |" >> $GITHUB_STEP_SUMMARY
          
